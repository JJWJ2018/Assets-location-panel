<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Location</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root { --border:#e3e6ea; --text:#1b1f24; --muted:#6b7480; --accent:#2f6df6; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--text); }
  .wrap { display:flex; flex-direction:column; height:100vh; }
  .body { padding:12px 14px; overflow-y:auto; flex:1; }
  .asset-name { font-size:13px; font-weight:600; margin:0 0 2px; word-break:break-all; }
  .coords { font-size:12px; color:var(--muted); margin:0 0 10px; font-variant-numeric:tabular-nums; }
  #map { width:100%; height:280px; border-radius:10px; border:1px solid var(--border); }
  .place { margin-top:10px; font-size:13px; }
  .place b { display:block; font-size:12px; color:var(--muted); font-weight:500; margin-bottom:2px; }
  .msg { margin-top:8px; font-size:12px; color:var(--muted); background:#fff7e6; border:1px solid #ffe0a3; padding:10px; border-radius:8px; }
  .msg.info { background:#eef3ff; border-color:#cdd9ff; }
</style>
</head>
<body>
<div class="wrap">
  <div class="body">
    <p class="asset-name" id="assetName">Geen asset geselecteerd</p>
    <p class="coords" id="coords"></p>
    <div id="map" style="display:none;"></div>
    <div class="place" id="place"></div>
    <div class="msg info" id="status">Verbinden met Assets…</div>
  </div>
</div>

<!-- SDK + Leaflet + config SYNCHROON laden (klassieke scripts). Cruciaal: de
     SDK-listener moet klaarstaan vóór de Assets-client z'n init-bericht stuurt.
     Een async esm.sh-import laadt te laat en mist dat bericht → handshake-timeout. -->
<script src="https://cdn.jsdelivr.net/npm/@woodwing/assets-client-sdk@0.0.5/dist/assets-client-sdk.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="./config.js"></script>
<script>
  // UMD-global van de SDK: window.AssetsClientSdk
  const { AssetsPluginContext } = window.AssetsClientSdk;

  const cfg = window.PLUGIN_CONFIG;
  const $ = (id) => document.getElementById(id);
  let map, marker;

  function ensureMap() {
    if (map) return;
    map = L.map('map', { zoomControl: true }).setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19, attribution: '© OpenStreetMap'
    }).addTo(map);
  }

  // Haalt lat/long uit de metadata van een geselecteerde asset.
  // GPS-velden kunnen direct op het item staan of onder .metadata — beide proberen.
  function extractCoords(asset) {
    if (!asset) return null;
    const md = asset.metadata || asset;
    const lat = parseFloat(md[cfg.GPS_LAT_FIELD]);
    const lon = parseFloat(md[cfg.GPS_LON_FIELD]);
    if (!isNaN(lat) && !isNaN(lon)) return { lat, lon };
    // fallback: gecombineerd veld, scheidingsteken komma OF spatie ("lat lon" / "lat,lon")
    const combined = md[cfg.GPS_LOCATION_FIELD];
    if (typeof combined === 'string') {
      const [a, b] = combined.trim().split(/[,\s]+/).map(parseFloat);
      if (!isNaN(a) && !isNaN(b)) return { lat: a, lon: b };
    }
    return null;
  }

  function render(asset) {
    const status = $('status');
    if (!asset) {
      $('assetName').textContent = 'Geen asset geselecteerd';
      $('coords').textContent = '';
      $('map').style.display = 'none';
      $('place').innerHTML = '';
      status.style.display = 'block';
      status.className = 'msg info';
      status.textContent = 'Selecteer een foto om de locatie te zien.';
      return;
    }

    const md = asset.metadata || asset;
    $('assetName').textContent = md.name || md.filename || asset.name || asset.id || 'Asset';

    const coords = extractCoords(asset);
    if (!coords) {
      $('map').style.display = 'none';
      $('coords').textContent = '';
      $('place').innerHTML = '';
      status.style.display = 'block';
      status.className = 'msg';
      status.textContent = 'Deze asset bevat geen GPS-metadata.';
      return;
    }

    status.style.display = 'none';
    $('coords').textContent = coords.lat.toFixed(5) + ', ' + coords.lon.toFixed(5);
    $('place').innerHTML = '';
    $('map').style.display = 'block';
    ensureMap();
    setTimeout(() => map.invalidateSize(), 0);
    map.setView([coords.lat, coords.lon], 13, { animate: true });
    if (marker) marker.remove();
    marker = L.marker([coords.lat, coords.lon]).addTo(map);
  }

  // Pakt de eerste geselecteerde asset uit een context/selectie-object.
  function firstSelected(ctx) {
    try {
      const sel = ctx?.activeTab?.assetSelection
        || ctx?.assetSelection
        || (Array.isArray(ctx) ? ctx : null);
      return sel && sel.length ? sel[0] : null;
    } catch (e) { return null; }
  }

  // ---- TIJDELIJKE DIAGNOSTIEK ----
  // Stuurt status naar de Assets-pagina zodat we van buitenaf kunnen meekijken.
  // Verwijderen zodra de plugin werkt.
  const diag = (stage, extra) => {
    try { window.parent.postMessage({ __diag: true, stage, ...extra }, '*'); } catch (_) {}
    try { $('status').textContent = 'DIAG: ' + stage + (extra ? ' ' + JSON.stringify(extra).slice(0,120) : ''); } catch(_){}
  };
  const sample = (obj) => {
    try { return obj && typeof obj === 'object' ? Object.keys(obj).slice(0, 40) : String(obj).slice(0,40); }
    catch (_) { return 'n/a'; }
  };

  (async () => {
    diag('boot', { hasPC: typeof AssetsPluginContext !== 'undefined' });
    try {
      // Race get() tegen een timeout zodat we "blijft hangen" kunnen onderscheiden.
      const ctx = await Promise.race([
        AssetsPluginContext.get(cfg.CLIENT_URL_WHITELIST),
        new Promise((_, rej) => setTimeout(() => rej(new Error('TIMEOUT_8s')), 8000)),
      ]);
      const c = ctx.context || {};
      const at = c.activeTab || {};
      const sel = at.assetSelection || c.assetSelection || [];
      const first = sel && sel.length ? sel[0] : null;
      diag('connected', {
        ctxKeys: sample(c),
        activeTabKeys: sample(at),
        selLen: Array.isArray(sel) ? sel.length : 'not-array',
        firstItemKeys: first ? sample(first) : null,
        mdKeys: first && first.metadata ? sample(first.metadata) : null,
      });
      const update = () => render(firstSelected(ctx.context));
      update();
      ctx.subscribe(update);
    } catch (err) {
      diag('error', { msg: String(err && err.message || err).slice(0, 120) });
    }
  })();
</script>
</body>
</html>
